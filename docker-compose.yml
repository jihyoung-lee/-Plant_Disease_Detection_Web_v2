name: plant-disease

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/var/www
      - backend_vendor:/var/www/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:${BACKEND_PORT:-8000}"
      FRONTEND_URL: "http://localhost:${FRONTEND_PORT:-5173}"
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: "${DB_DATABASE:-plant_disease}"
      DB_USERNAME: "${DB_USERNAME:-plant}"
      DB_PASSWORD: "${DB_PASSWORD:-plant_secret}"
      CACHE_DRIVER: redis
      REDIS_CLIENT: phpredis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PREDICT_URL: "${PREDICT_URL:-http://host.docker.internal:5000/predict}"
      RDA_API_KEY: "${RDA_API_KEY:-}"
      API_URL: "${API_URL:-http://ncpms.rda.go.kr/npmsAPI/service}"
      MAILERSEND_API_KEY: "${MAILERSEND_API_KEY:-}"
      MAILERSEND_FROM_ADDRESS: "${MAILERSEND_FROM_ADDRESS:-test@test-51ndgwv138xlzqx8.mlsender.net}"
      MAILERSEND_FROM_NAME: "${MAILERSEND_FROM_NAME:-AI서비스}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      AUTO_MIGRATE: "${AUTO_MIGRATE:-true}"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/csrf-token"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  frontend:
    build:
      context: ./vue
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./vue:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_API_BASE_URL: "http://localhost:${BACKEND_PORT:-8000}/api"
      VITE_GOOGLE_CLIENT_ID: "${VITE_GOOGLE_CLIENT_ID:-}"
    depends_on:
      backend:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-plant_disease}"
      MYSQL_USER: "${DB_USERNAME:-plant}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-plant_secret}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  backend_vendor:
  frontend_node_modules:
  mysql_data:
  redis_data:
